# Render Blueprint — pulls pre-built image from GitHub Container Registry.
# Image is built by .github/workflows/docker-publish.yml (not on Render).
#
# FIRST-TIME SETUP:
#   1. Push to main and wait for GitHub Actions "Publish Docker image" to finish.
#   2. GitHub → Packages → smartriver → Package settings → Change visibility → Public.
#   3. Render → delete any failed smartriver service → Blueprint Manual sync.
services:
  - type: web
    name: smartriver
    runtime: image
    plan: free
    image:
      url: ghcr.io/zarifirfan42/smartriver:latest
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SMARTRIVER_DEFER_FORECAST
        value: "true"
      - key: SMARTRIVER_OTP_DEV_LOG
        value: "true"
      - key: SMARTRIVER_SQLITE_PATH
        value: /tmp/smartriver.sqlite3
      - key: TF_NUM_INTRAOP_THREADS
        value: "1"
      - key: TF_NUM_INTEROP_THREADS
        value: "1"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
